server:
  port: 8084
  servlet:
    context-path: /authentication
spring:
  application:
    name: finance-authentication

finance:
  security:
    # Used by MeSecurityConfig's InternalRequestFilter to authenticate
    # /v1/me/** calls forwarded by the gateway. Must match the gateway's
    # finance.gateway.internal.secret. See REQ-settings-backend §3.
    internal:
      secret: ${INTERNAL_SERVICE_SECRET:}

app:
  firebase:
    credentials-path: ${FIREBASE_ADMIN_KEY_JSON:}
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
    project-id: ${FIREBASE_PROJECT_ID:}
    api-key: ${FIREBASE_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
